<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 鄉村文明 - AI Village</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 { 
            color: #ffd700; 
            margin-bottom: 5px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 28px;
        }
        
        .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        .online { color: #4ade80; }
        
        #status-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
        }
        
        .villager-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .villager-card {
            background: linear-gradient(145deg, #16213e 0%, #1a1a2e 100%);
            border: 2px solid #0f3460;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .villager-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #e94560;
        }
        
        .villager-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .villager-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 3px solid;
        }
        
        .villager-avatar.farmer { background: linear-gradient(135deg, #4ade80, #22c55e); border-color: #4ade80; }
        .villager-avatar.blacksmith { background: linear-gradient(135deg, #f97316, #ea580c); border-color: #f97316; }
        .villager-avatar.apprentice { background: linear-gradient(135deg, #a78bfa, #8b5cf6); border-color: #a78bfa; }
        
        .villager-info h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .villager-role {
            font-size: 12px;
            color: #888;
            background: #0f3460;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .state-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 10px;
        }
        .state-idle { background: #4ade80; color: #000; }
        .state-moving { background: #60a5fa; color: #000; }
        .state-working { background: #facc15; color: #000; }
        .state-talking { background: #c084fc; color: #000; }
        .state-resting { background: #fb923c; color: #000; }
        
        .goal {
            margin-top: 10px;
            padding: 10px;
            background: #0f346033;
            border-radius: 8px;
            font-size: 13px;
            color: #a78bfa;
        }
        
        .section-title {
            font-size: 14px;
            color: #e94560;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e94560;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .radar-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .radar-chart {
            width: 150px;
            height: 150px;
        }
        
        .personality-stats {
            flex: 1;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
        }
        
        .stat-label { color: #888; }
        
        .stat-bar {
            width: 100px;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .stat-fill.openness { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .stat-fill.conscientiousness { background: linear-gradient(90deg, #f97316, #ea580c); }
        .stat-fill.extraversion { background: linear-gradient(90deg, #facc15, #eab308); }
        .stat-fill.agreeableness { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
        .stat-fill.neuroticism { background: linear-gradient(90deg, #c084fc, #a855f7); }
        
        .memory-list {
            max-height: 120px;
            overflow-y: auto;
        }
        
        .memory-item {
            padding: 8px 10px;
            margin: 5px 0;
            background: #0f346022;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid;
        }
        
        .memory-item.positive { border-left-color: #4ade80; }
        .memory-item.negative { border-left-color: #ef4444; }
        .memory-item.neutral { border-left-color: #888; }
        
        .memory-emoji {
            font-size: 14px;
            margin-right: 5px;
        }
        
        .memory-tick {
            float: right;
            font-size: 10px;
            color: #555;
        }
        
        .relationship-list {
            display: grid;
            gap: 10px;
        }
        
        .relationship-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #0f346022;
            border-radius: 8px;
        }
        
        .rel-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .rel-info {
            flex: 1;
        }
        
        .rel-name {
            font-size: 13px;
            font-weight: bold;
        }
        
        .rel-attitude {
            font-size: 11px;
            color: #888;
        }
        
        .rel-emotions {
            font-size: 10px;
            margin-top: 3px;
        }
        
        .emotion-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 3px;
            font-size: 9px;
        }
        
        .emotion-friendly { background: #4ade8044; color: #4ade80; }
        .emotion-grateful { background: #facc1544; color: #facc15; }
        .emotion-curious { background: #60a5fa44; color: #60a5fa; }
        .emotion-angry { background: #ef444444; color: #ef4444; }
        .emotion-neutral { background: #88888844; color: #888; }
        
        .affinity-bar {
            width: 60px;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .affinity-fill {
            height: 100%;
            border-radius: 3px;
        }
        
        .affinity-positive { background: #4ade80; }
        .affinity-negative { background: #ef4444; }
        .affinity-neutral { background: #888; }
        
        footer {
            margin-top: 30px;
            padding: 20px;
            background: #0f3460;
            border-radius: 10px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
        
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🏘️ AI 鄉村文明</h1>
    <p class="subtitle">每個村民都有獨特的性格、記憶與人際關係</p>
    
    <div id="status-bar">
        <div class="status-item">
            <span>📊 Tick:</span>
            <strong id="tick">—</strong>
        </div>
        <div class="status-item">
            <span>⏰ 更新:</span>
            <span id="last-update">—</span>
        </div>
        <div class="status-item">
            <span class="weather-badge" id="weather">🌤️ 載入中...</span>
        </div>
        <div class="status-item">
            <span id="status" class="loading">⟳ 連接中...</span>
        </div>
    </div>
    
    <div class="villager-grid" id="villagers">
        <!-- Villager cards will be inserted here -->
    </div>
    
    <footer>
        <p>🤖 AI Village | 基於 Supabase + OpenClaw Agents</p>
        <p>每 15 分鐘自動更新 | 村民會根據性格、記憶和人際關係做出決定</p>
    </footer>
    
    <script>
        // Config
        const SUPABASE_URL = 'https://yqwcxushplzodbnqwqxn.supabase.co';
        const ANON_KEY = 'sb_publishable_wCLebgvM4KNlSkqyevXhWA_DHOO92Lh';
        const REFRESH_INTERVAL = 5000;
        
        // Emoji map
        const ROLE_EMOJI = { farmer: '🌾', blacksmith: '🔨', apprentice: '📖', leader: '👑' };
        const WEATHER_EMOJI = { sunny: '☀️', cloudy: '☁️', rainy: '🌧️', stormy: '⛈️', snowy: '❄️' };
        const STATE_EMOJI = { idle: '😴', moving: '🚶', working: '⚒️', talking: '💬', resting: '🛋️' };
        
        let lastTick = -1;
        
        async function fetchState() {
            try {
                const response = await fetch(
                    SUPABASE_URL + '/rest/v1/village_state?id=eq.main',
                    { headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY } }
                );
                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                if (data && data.length > 0) {
                    render(data[0]);
                    document.getElementById('status').innerHTML = '<span class="online">✅ 已連接</span>';
                    document.getElementById('status').classList.remove('loading');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = '<span style="color:#ef4444">⚠️ 連接失敗</span>';
            }
        }
        
        function render(state) {
            if (!state || !state.meta) return;
            if (state.meta.tick === lastTick) return;
            lastTick = state.meta.tick;
            
            const { meta, agents } = state;
            
            // Update meta
            document.getElementById('tick').textContent = meta.tick;
            document.getElementById('last-update').textContent = new Date(meta.lastUpdated).toLocaleTimeString('zh-TW');
            
            const weather = meta.weather || { type: 'sunny', emoji: '☀️' };
            document.getElementById('weather').textContent = `${weather.emoji} ${getWeatherText(weather.type)}`;
            
            // Render villagers
            if (agents && Array.isArray(agents)) {
                document.getElementById('villagers').innerHTML = agents.map(renderVillagerCard).join('');
                
                // Draw radar charts
                agents.forEach(agent => {
                    setTimeout(() => drawRadarChart('radar-' + agent.id, agent.personality || {}), 100);
                });
            }
        }
        
        function renderVillagerCard(agent) {
            const personality = agent.personality || {};
            const memory = agent.memory || {};
            const relationships = agent.relationships || {};
            
            // Get memories
            const memories = (memory.observations || []).slice(-3).reverse();
            
            // Get relationships
            const relHtml = Object.entries(relationships).map(([id, rel]) => {
                const targetAgent = getAgentById(id);
                if (!targetAgent) return '';
                return renderRelationship(id, rel, targetAgent);
            }).join('');
            
            return `
                <div class="villager-card">
                    <div class="villager-header">
                        <div class="villager-avatar ${agent.role || ''}">
                            ${getGenderEmoji(agent.gender)} ${ROLE_EMOJI[agent.role] || '👤'}
                        </div>
                        <div class="villager-info">
                            <h2>${agent.name || '未知'} ${getGenderEmoji(agent.gender)}</h2>
                            <span class="villager-role">${getRoleText(agent.role)} · ${agent.age || '?'}歲 · ${getGenderText(agent.gender)}</span>
                            <span class="state-badge state-${agent.state || 'idle'}">
                                ${STATE_EMOJI[agent.state] || ''} ${getStateText(agent.state)}
                            </span>
                        </div>
                    </div>
                    
                    <div class="goal">
                        🎯 目標: ${memory.currentGoal || agent.goal || '快樂生活'}
                    </div>
                    
                    <div class="section-title">🧠 性格特徵</div>
                    <div class="radar-container">
                        <canvas id="radar-${agent.id}" class="radar-chart" width="150" height="150"></canvas>
                        <div class="personality-stats">
                            ${renderPersonalityStat('開放性', personality.openness)}
                            ${renderPersonalityStat('盡責性', personality.conscientiousness)}
                            ${renderPersonalityStat('外向性', personality.extraversion)}
                            ${renderPersonalityStat('友善性', personality.agreeableness)}
                            ${renderPersonalityStat('神經質', personality.neuroticism)}
                        </div>
                    </div>
                    
                    <div class="section-title">📝 最近記憶</div>
                    <div class="memory-list">
                        ${memories.length > 0 ? memories.map(m => renderMemory(m)).join('') : '<p style="color:#555;font-size:12px">還沒有記憶</p>'}
                    </div>
                    
                    <div class="section-title">💕 人際關係</div>
                    <div class="relationship-list">
                        ${relHtml || '<p style="color:#555;font-size:12px">還沒有建立關係</p>'}
                    </div>
                </div>
            `;
        }
        
        function renderPersonalityStat(name, value) {
            const val = Math.round((value || 0.5) * 100);
            const cls = name === '神經質' ? 'neuroticism' : 
                        name === '開放性' ? 'openness' :
                        name === '盡責性' ? 'conscientiousness' :
                        name === '外向性' ? 'extraversion' : 'agreeableness';
            return `
                <div class="stat-row">
                    <span class="stat-label">${name}</span>
                    <div class="stat-bar">
                        <div class="stat-fill ${cls}" style="width: ${val}%"></div>
                    </div>
                </div>
            `;
        }
        
        function renderMemory(m) {
            const valence = m.emotional_valence || 0;
            const cls = valence > 0.3 ? 'positive' : valence < -0.3 ? 'negative' : 'neutral';
            const emoji = valence > 0.3 ? '😊' : valence < -0.3 ? '😠' : '🤔';
            return `
                <div class="memory-item ${cls}">
                    <span class="memory-emoji">${emoji}</span>
                    ${m.content || '...'}
                    <span class="memory-tick">Tick ${m.tick}</span>
                </div>
            `;
        }
        
        function renderRelationship(id, rel, target) {
            const affinity = rel.affinity || 0;
            const affCls = affinity > 0.2 ? 'positive' : affinity < -0.2 ? 'negative' : 'neutral';
            const attText = affinity > 0.3 ? '有好感' : affinity < -0.3 ? '有反感' : '一般';
            
            const emotions = (rel.active_emotions || []).slice(-2);
            const emotionHtml = emotions.map(e => 
                `<span class="emotion-tag emotion-${e}">${getEmotionText(e)}</span>`
            ).join('');
            
            return `
                <div class="relationship-item">
                    <div class="rel-avatar" style="background: ${getRoleGradient(target.role)}">
                        ${ROLE_EMOJI[target.role] || '👤'}
                    </div>
                    <div class="rel-info">
                        <div class="rel-name">${target.name || '未知'}</div>
                        <div class="rel-attitude">${attText}</div>
                        ${emotionHtml ? `<div class="rel-emotions">${emotionHtml}</div>` : ''}
                    </div>
                    <div class="affinity-bar">
                        <div class="affinity-fill affinity-${affCls}" style="width: ${Math.abs(affinity) * 100}%"></div>
                    </div>
                </div>
            `;
        }
        
        function drawRadarChart(canvasId, personality) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const centerX = 75, centerY = 75, radius = 55;
            
            const labels = ['開放', '盡責', '外向', '友善', '神經'];
            const values = [
                personality.openness || 0.5,
                personality.conscientiousness || 0.5,
                personality.extraversion || 0.5,
                personality.agreeableness || 0.5,
                personality.neuroticism || 0.5
            ];
            
            ctx.clearRect(0, 0, 150, 150);
            
            // Draw grid
            ctx.strokeStyle = '#0f346044';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                for (let j = 0; j < 5; j++) {
                    const angle = (Math.PI * 2 * j / 5) - Math.PI / 2;
                    const r = radius * i / 5;
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;
                    if (i === 1) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // Draw axis lines
            for (let i = 0; i < 5; i++) {
                const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
                
                // Labels
                ctx.fillStyle = '#888';
                ctx.font = '9px Microsoft JhengHei';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], centerX + Math.cos(angle) * (radius + 12), centerY + Math.sin(angle) * (radius + 12));
            }
            
            // Draw data
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
                const r = (values[i] || 0.5) * radius;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw dots
            for (let i = 0; i < 5; i++) {
                const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
                const r = (values[i] || 0.5) * radius;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#e94560';
                ctx.fill();
            }
        }
        
        // Helper functions
        function getAgentById(id) {
            const state = window._cachedState;
            if (!state || !state.agents) return null;
            return state.agents.find(a => a.id === id);
        }
        
        function getRoleText(role) {
            const map = { farmer: '🌾 農夫', blacksmith: '🔨 鐵匠', apprentice: '📖 學徒', leader: '👑 領袖' };
            return map[role] || role;
        }
        
        function getStateText(state) {
            const map = { idle: '閒置', moving: '移動中', working: '工作中', talking: '交談中', resting: '休息' };
            return map[state] || state;
        }
        
        function getWeatherText(type) {
            const map = { sunny: '晴天', cloudy: '多雲', rainy: '雨天', stormy: '暴風雨', snowy: '下雪' };
            return map[type] || type;
        }
        
        function getEmotionText(emotion) {
            const map = { friendly: '友好', grateful: '感激', curious: '好奇', angry: '生氣', patient: '耐心', neutral: '中立' };
            return map[emotion] || emotion;
        }
        
        function getRoleGradient(role) {
            const map = { 
                farmer: 'linear-gradient(135deg, #4ade80, #22c55e)', 
                blacksmith: 'linear-gradient(135deg, #f97316, #ea580c)',
                apprentice: 'linear-gradient(135deg, #a78bfa, #8b5cf6)'
            };
            return map[role] || '#60a5fa';
        }
        
        function getGenderEmoji(gender) {
            const map = { female: '👩', male: '👨', other: '🧑' };
            return map[gender] || '👤';
        }
        
        function getGenderText(gender) {
            const map = { female: '女性', male: '男性', other: '其他' };
            return map[gender] || '未知';
        }
        
        // Start
        fetchState();
        setInterval(fetchState, REFRESH_INTERVAL);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 鄉村文明 - AI Village</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 { 
            color: #ffd700; 
            margin-bottom: 5px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 28px;
        }
        
        .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        .online { color: #4ade80; }
        
        #status-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
        }
        
        .resource-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #0f346066;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
        }
        
        .resource-icon { font-size: 14px; }
        .resource-value { font-weight: bold; color: #ffd700; }
        
        /* Map Container */
        #map-container {
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            background: #0f3460;
            padding: 15px;
        }
        
        #village-map {
            display: block;
            background: #1a1a2e;
            border-radius: 8px;
        }
        
        .map-legend {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #888;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .events-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
        }
        
        .events-title {
            font-size: 14px;
            color: #e94560;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #16213e;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .event-tick {
            color: #555;
            font-size: 10px;
            min-width: 40px;
        }
        
        .event-message { color: #ddd; }
        
        .event-type-action { color: #60a5fa; }
        .event-type-social { color: #c084fc; }
        .event-type-system { color: #facc15; }
        .event-type-default { color: #888; }
        
        .villager-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .villager-card {
            background: linear-gradient(145deg, #16213e 0%, #1a1a2e 100%);
            border: 2px solid #0f3460;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .villager-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #e94560;
        }
        
        .villager-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .villager-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border: 3px solid #60a5fa;
        }
        
        .villager-info h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .villager-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 5px;
        }
        
        .meta-tag {
            background: #0f3460;
            padding: 3px 10px;
            border-radius: 10px;
        }
        
        .state-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 8px;
        }
        .state-idle { background: #4ade80; color: #000; }
        .state-moving { background: #60a5fa; color: #000; }
        .state-working { background: #facc15; color: #000; }
        .state-talking { background: #c084fc; color: #000; }
        .state-resting { background: #fb923c; color: #000; }
        .state-default { background: #888; color: #000; }
        
        .goal {
            margin-top: 10px;
            padding: 10px;
            background: #0f346033;
            border-radius: 8px;
            font-size: 13px;
            color: #a78bfa;
        }
        
        .last-decision {
            margin-top: 8px;
            padding: 8px 10px;
            background: #0f346022;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .last-decision-label { color: #888; margin-right: 5px; }
        .last-decision-reason { color: #a78bfa; font-style: italic; }
        
        .section-title {
            font-size: 14px;
            color: #e94560;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e94560;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .memory-list {
            max-height: 120px;
            overflow-y: auto;
        }
        
        .memory-item {
            padding: 8px 10px;
            margin: 5px 0;
            background: #0f346022;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid;
        }
        
        .memory-item.positive { border-left-color: #4ade80; }
        .memory-item.negative { border-left-color: #ef4444; }
        .memory-item.neutral { border-left-color: #888; }
        
        .memory-emoji {
            font-size: 14px;
            margin-right: 5px;
        }
        
        .memory-tick {
            float: right;
            font-size: 10px;
            color: #555;
        }
        
        .memory-content { color: #ddd; }
        
        .relationship-list {
            display: grid;
            gap: 10px;
        }
        
        .relationship-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #0f346022;
            border-radius: 8px;
        }
        
        .rel-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
        }
        
        .rel-info {
            flex: 1;
        }
        
        .rel-name {
            font-size: 13px;
            font-weight: bold;
        }
        
        .rel-stats {
            display: flex;
            gap: 10px;
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        
        .rel-emotions {
            font-size: 10px;
            margin-top: 3px;
        }
        
        .emotion-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 3px;
            font-size: 9px;
        }
        
        .emotion-friendly { background: #4ade8044; color: #4ade80; }
        .emotion-grateful { background: #facc1544; color: #facc15; }
        .emotion-curious { background: #60a5fa44; color: #60a5fa; }
        .emotion-angry { background: #ef444444; color: #ef4444; }
        .emotion-neutral { background: #88888844; color: #888; }
        .emotion-trusting { background: #4ade8044; color: #4ade80; }
        .emotion-happy { background: #facc1544; color: #facc15; }
        .emotion-sad { background: #60a5fa44; color: #60a5fa; }
        .emotion-scared { background: #c084fc44; color: #c084fc; }
        .emotion-disgusted { background: #f9731644; color: #f97316; }
        .emotion-surprised { background: #fb923c44; color: #fb923c; }
        
        .affinity-bar {
            width: 60px;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .affinity-fill {
            height: 100%;
            border-radius: 3px;
        }
        
        .affinity-positive { background: #4ade80; }
        .affinity-negative { background: #ef4444; }
        .affinity-neutral { background: #888; }
        
        footer {
            margin-top: 30px;
            padding: 20px;
            background: #0f3460;
            border-radius: 10px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
        
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state h3 { color: #aaa; margin-bottom: 10px; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🏘️ AI 鄉村文明</h1>
    <p class="subtitle">每個村民都有獨特的記憶與人際關係</p>
    
    <div id="status-bar">
        <div class="status-item">
            <span>📊 Tick:</span>
            <strong id="tick">—</strong>
        </div>
        <div class="status-item">
            <span>⏰ 更新:</span>
            <span id="last-update">—</span>
        </div>
        <div class="status-item">
            <span class="weather-badge" id="weather">🌤️ 載入中...</span>
        </div>
        <div class="status-item">
            <span>👥 人口:</span>
            <span id="population">—</span>
        </div>
        <div class="status-item resource-bar" id="resources"></div>
        <div class="status-item">
            <span id="status" class="loading">⟳ 連接中...</span>
        </div>
    </div>
    
    <!-- Map Container -->
    <div id="map-container">
        <canvas id="village-map" width="600" height="450"></canvas>
        <div class="map-legend">
            <span class="legend-item">🏠 建築</span>
            <span class="legend-item">🌲 樹林</span>
            <span class="legend-item">🌾 農田</span>
            <span class="legend-item">💧 水源</span>
            <span class="legend-item">🪨 石頭</span>
            <span class="legend-item">⚡ 工作中</span>
            <span class="legend-item">🚶 移動中</span>
            <span class="legend-item">💤 休息中</span>
        </div>
    </div>
    
    <div class="events-section" id="events-section" style="display:none">
        <div class="events-title">📜 最近事件</div>
        <div class="event-list" id="event-list"></div>
    </div>
    
    <div class="villager-grid" id="villagers">
        <div class="empty-state">
            <h3>⟳ 載入中...</h3>
            <p>正在從 Supabase 獲取村莊資料</p>
        </div>
    </div>
    
    <footer>
        <p>🤖 AI Village | 基於 Supabase + OpenClaw Agents</p>
        <p>每 5 秒自動更新 | 村民會根據記憶和人際關係做出決定</p>
    </footer>
    
    <script>
        // ============================================================
        // Map Config
        // ============================================================
        const CELL_SIZE = 30;
        const MAP_WIDTH = 20;
        const MAP_HEIGHT = 15;
        
        // Villager colors
        const VILLAGER_COLORS = {
            alice: '#4ade80',
            bob: '#f97316',
            carol: '#a78bfa'
        };
        
        // Static decorations (pre-generated)
        const DECORATIONS = generateDecorations();
        
        // Animation state
        let animationTime = 0;
        let currentVillagers = [];
        let currentMapSize = { width: MAP_WIDTH, height: MAP_HEIGHT };
        
        // Canvas setup
        const canvas = document.getElementById('village-map');
        const ctx = canvas.getContext('2d');
        
        // ============================================================
        // Generate static map decorations
        // ============================================================
        function generateDecorations() {
            const decs = [];
            const rand = seededRandom(42);
            
            // Buildings (clustered in center-ish area)
            for (let i = 0; i < 5; i++) {
                decs.push({
                    x: Math.floor(rand() * 12 + 4),
                    y: Math.floor(rand() * 8 + 3),
                    emoji: '🏠'
                });
            }
            
            // Trees (edges)
            for (let i = 0; i < 8; i++) {
                let x, y;
                if (i % 2 === 0) {
                    x = Math.floor(rand() * 3);
                    y = Math.floor(rand() * MAP_HEIGHT);
                } else {
                    x = MAP_WIDTH - 1 - Math.floor(rand() * 3);
                    y = Math.floor(rand() * MAP_HEIGHT);
                }
                decs.push({ x, y, emoji: '🌲' });
            }
            
            // Farmland (scattered)
            for (let i = 0; i < 4; i++) {
                decs.push({
                    x: Math.floor(rand() * 8 + 2),
                    y: Math.floor(rand() * 4 + 10),
                    emoji: '🌾'
                });
            }
            
            // Water (ponds)
            for (let i = 0; i < 2; i++) {
                decs.push({
                    x: Math.floor(rand() * 4 + 14),
                    y: Math.floor(rand() * 3 + 1),
                    emoji: '💧'
                });
            }
            
            // Rocks
            for (let i = 0; i < 3; i++) {
                decs.push({
                    x: Math.floor(rand() * 6 + 12),
                    y: Math.floor(rand() * 5 + 9),
                    emoji: '🪨'
                });
            }
            
            return decs;
        }
        
        // Seeded random for consistent decorations
        function seededRandom(seed) {
            let s = seed;
            return function() {
                s = Math.sin(s) * 10000;
                return s - Math.floor(s);
            };
        }
        
        // ============================================================
        // Get villager position
        // ============================================================
        function getVillagerPosition(name, mapWidth, mapHeight) {
            // Try to use position from state if available
            const v = currentVillagers.find(a => a.name === name);
            if (v && v.position && typeof v.position.x === 'number') {
                return { x: v.position.x, y: v.position.y };
            }
            // Hash-based position
            const code = name.charCodeAt(0);
            const x = code % mapWidth;
            const y = (code * 7) % mapHeight;
            return { x, y };
        }
        
        // ============================================================
        // Draw functions
        // ============================================================
        function drawMap(state) {
            if (!state) return;
            
            const mapInfo = state.map || { width: MAP_WIDTH, height: MAP_HEIGHT };
            const mapW = mapInfo.width || MAP_WIDTH;
            const mapH = mapInfo.height || MAP_HEIGHT;
            currentMapSize = { width: mapW, height: mapH };
            
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#0f346044';
            ctx.lineWidth = 0.5;
            
            for (let x = 0; x <= mapW; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CELL_SIZE, 0);
                ctx.lineTo(x * CELL_SIZE, mapH * CELL_SIZE);
                ctx.stroke();
            }
            
            for (let y = 0; y <= mapH; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CELL_SIZE);
                ctx.lineTo(mapW * CELL_SIZE, y * CELL_SIZE);
                ctx.stroke();
            }
            
            // Draw decorations
            drawDecorations(mapW, mapH);
            
            // Draw villagers
            if (state.agents && Array.isArray(state.agents)) {
                currentVillagers = state.agents;
                state.agents.forEach(agent => {
                    const pos = getVillagerPosition(agent.name, mapW, mapH);
                    drawVillager(ctx, agent, pos.x, pos.y);
                });
            }
        }
        
        function drawDecorations(mapW, mapH) {
            ctx.font = '16px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            DECORATIONS.forEach(dec => {
                if (dec.x < mapW && dec.y < mapH) {
                    const cx = dec.x * CELL_SIZE + CELL_SIZE / 2;
                    const cy = dec.y * CELL_SIZE + CELL_SIZE / 2;
                    ctx.fillText(dec.emoji, cx, cy);
                }
            });
        }
        
        function drawVillager(ctx, agent, gridX, gridY) {
            const cx = gridX * CELL_SIZE + CELL_SIZE / 2;
            const cy = gridY * CELL_SIZE + CELL_SIZE / 2;
            const radius = 12;
            
            const color = VILLAGER_COLORS[agent.id] || '#60a5fa';
            const state = agent.state || 'idle';
            
            // Draw moving animation offset
            let offsetX = 0, offsetY = 0;
            if (state === 'moving') {
                offsetX = Math.sin(animationTime * 0.1) * 3;
                offsetY = Math.cos(animationTime * 0.1) * 2;
            }
            
            // Draw circle
            ctx.beginPath();
            ctx.arc(cx + offsetX, cy + offsetY, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            // Draw border
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw initial
            ctx.fillStyle = '#000';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(agent.name.charAt(0), cx + offsetX, cy + offsetY);
            
            // Draw status effect
            drawStatusEffect(ctx, state, cx + offsetX, cy + offsetY);
        }
        
        function drawStatusEffect(ctx, state, x, y) {
            ctx.font = '12px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            switch (state) {
                case 'working':
                    // Lightning bolt (flashing)
                    if (Math.floor(animationTime / 30) % 2 === 0) {
                        ctx.fillText('⚡', x, y - 15);
                    }
                    break;
                case 'talking':
                    // Speech bubble
                    ctx.fillText('💬', x, y - 15);
                    break;
                case 'moving':
                    // Walking animation above
                    ctx.fillText('🚶', x, y - 18);
                    break;
                case 'resting':
                    // ZZZ animation
                    const zOffset = Math.sin(animationTime * 0.05) * 5;
                    ctx.fillText('💤', x + zOffset, y - 18);
                    break;
                case 'idle':
                default:
                    // No effect
                    break;
            }
        }
        
        // ============================================================
        // Config
        // ============================================================
        const SUPABASE_URL = 'https://yqwcxushplzodbnqwqxn.supabase.co';
        const ANON_KEY = 'sb_publishable_wCLebgvM4KNlSkqyevXhWA_DHOO92Lh';
        const REFRESH_INTERVAL = 5000;
        
        // ============================================================
        // Emoji / Text Maps
        // ============================================================
        const WEATHER_EMOJI = { sunny: '☀️', cloudy: '☁️', rainy: '🌧️', stormy: '⛈️', snowy: '❄️' };
        const STATE_EMOJI = { idle: '😴', moving: '🚶', working: '⚒️', talking: '💬', resting: '🛋️' };
        
        const STATE_TEXT = { idle: '閒置', moving: '移動中', working: '工作中', talking: '交談中', resting: '休息' };
        const WEATHER_TEXT = { sunny: '晴天', cloudy: '多雲', rainy: '雨天', stormy: '暴風雨', snowy: '下雪' };
        const EMOTION_TEXT = {
            friendly: '友好', grateful: '感激', curious: '好奇', angry: '生氣',
            patient: '耐心', neutral: '中立', trusting: '信任', happy: '開心',
            sad: '傷心', scared: '害怕', disgusted: '厭惡', surprised: '驚訝'
        };
        
        const RESOURCE_EMOJI = { food: '🍖', gold: '💰', wood: '🪵', stone: '🪨' };
        const RESOURCE_TEXT = { food: '食物', gold: '金幣', wood: '木材', stone: '石頭' };
        
        const ACTION_EMOJI = {
            work: '⚒️', move: '🚶', talk: '💬', rest: '🛋️',
            eat: '🍽️', farm: '🌾', build: '🔨', explore: '🗺️'
        };
        
        // ============================================================
        // State Cache
        // ============================================================
        let cachedState = null;
        let lastTick = -1;
        let animationTime = 0;
        
        // ============================================================
        // Animation loop
        // ============================================================
        function animate() {
            animationTime++;
            drawMap(cachedState || {
                map: { width: MAP_WIDTH, height: MAP_HEIGHT },
                agents: []
            });
            requestAnimationFrame(animate);
        }
        
        // ============================================================
        // Init
        // ============================================================
        fetchState();
        setInterval(fetchState, REFRESH_INTERVAL);
        animate();
        
        // ============================================================
        // Fetch from Supabase
        // ============================================================
        async function fetchState() {
            try {
                const response = await fetch(
                    SUPABASE_URL + '/rest/v1/village_state?id=eq.main',
                    {
                        headers: {
                            'apikey': ANON_KEY,
                            'Authorization': 'Bearer ' + ANON_KEY,
                            'Accept': 'application/json'
                        }
                    }
                );
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data || data.length === 0) {
                    throw new Error('No data returned');
                }
                cachedState = data[0];
                renderAll(cachedState);
                updateStatus('<span class="online">✅ 已連接</span>', false);
            } catch (err) {
                console.error('[AI Village] Fetch error:', err);
                updateStatus('<span style="color:#ef4444">⚠️ 連接失敗</span>', false);
            }
        }
        
        // ============================================================
        // Update status bar
        // ============================================================
        function updateStatus(html, loading) {
            const el = document.getElementById('status');
            el.innerHTML = html;
            if (loading) el.classList.add('loading');
            else el.classList.remove('loading');
        }
        
        // ============================================================
        // Main render
        // ============================================================
        function renderAll(state) {
            if (!state || !state.meta) return;
            
            const { meta, agents, village, events } = state;
            
            // Skip if tick unchanged
            if (meta.tick === lastTick) return;
            lastTick = meta.tick;
            
            // ---- Status Bar ----
            document.getElementById('tick').textContent = meta.tick;
            
            if (meta.lastUpdated) {
                const d = new Date(meta.lastUpdated);
                document.getElementById('last-update').textContent = d.toLocaleString('zh-TW');
            }
            
            const weather = meta.weather || { type: 'sunny', emoji: '☀️' };
            const wType = weather.type || 'sunny';
            const wEmoji = weather.emoji || WEATHER_EMOJI[wType] || '☀️';
            const wText = WEATHER_TEXT[wType] || wType;
            document.getElementById('weather').textContent = `${wEmoji} ${wText}`;
            
            // ---- Village Info ----
            if (village) {
                document.getElementById('population').textContent = village.population ?? '?';
                
                // Resources
                const resourcesEl = document.getElementById('resources');
                const resources = village.resources || {};
                resourcesEl.innerHTML = Object.entries(resources).map(([key, val]) => {
                    const icon = RESOURCE_EMOJI[key] || '📦';
                    const name = RESOURCE_TEXT[key] || key;
                    return `<div class="resource-item">
                        <span class="resource-icon">${icon}</span>
                        <span class="resource-value">${val ?? 0}</span>
                        <span style="color:#888;font-size:11px">${name}</span>
                    </div>`;
                }).join('');
            }
            
            // ---- Events (last 5) ----
            const eventsSection = document.getElementById('events-section');
            const eventList = document.getElementById('event-list');
            if (events && Array.isArray(events) && events.length > 0) {
                eventsSection.style.display = 'block';
                const lastEvents = events.slice(-5).reverse();
                eventList.innerHTML = lastEvents.map(ev => {
                    const typeClass = `event-type-${ev.type || 'default'}`;
                    const tickStr = ev.tick ? `T${ev.tick}` : '';
                    return `<div class="event-item">
                        <span class="event-tick">${tickStr}</span>
                        <span class="event-message ${typeClass}">${escHtml(ev.message || ev.reason || '')}</span>
                    </div>`;
                }).join('');
            } else {
                eventsSection.style.display = 'none';
            }
            
            // ---- Villagers ----
            const container = document.getElementById('villagers');
            
            if (!agents || !Array.isArray(agents) || agents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>🏘️ 村莊是空的</h3>
                        <p>還沒有村民入住</p>
                    </div>`;
                return;
            }
            
            container.innerHTML = agents.map(renderVillagerCard).join('');
        }
        
        // ============================================================
        // Render one villager card
        // ============================================================
        function renderVillagerCard(agent) {
            const memory = agent.memory || {};
            const relationships = agent.relationships || {};
            
            const state = agent.state || 'idle';
            
            // Goal from memory.currentGoal
            const currentGoal = memory.currentGoal || '快樂生活';
            
            // Recent memories (last 3, newest first)
            const observations = (memory.observations || []).slice(-3).reverse();
            
            // Relationships
            const relEntries = Object.entries(relationships);
            
            // Build meta tags (only fields that exist)
            const metaTags = [];
            if (agent.birthday) metaTags.push(`🎂 ${agent.birthday}`);
            if (agent.specialty && agent.specialty !== '待發掘') metaTags.push(`⭐ ${agent.specialty}`);
            if (agent.family_status && agent.family_status !== '待發掘') metaTags.push(`👨‍👩‍👧 ${agent.family_status}`);
            if (agent.hobbies && Array.isArray(agent.hobbies) && agent.hobbies.length > 0) {
                metaTags.push(`🎯 ${agent.hobbies.join(', ')}`);
            }
            
            return `
                <div class="villager-card">
                    <div class="villager-header">
                        <div class="villager-avatar">
                            👤
                        </div>
                        <div class="villager-info">
                            <h2>${escHtml(agent.name || '未知')}</h2>
                            <div class="villager-meta">
                                ${metaTags.length > 0 
                                    ? metaTags.map(t => `<span class="meta-tag">${escHtml(t)}</span>`).join('')
                                    : ''
                                }
                            </div>
                            <span class="state-badge state-${state}">
                                ${STATE_EMOJI[state] || ''} ${STATE_TEXT[state] || state}
                            </span>
                        </div>
                    </div>
                    
                    <div class="goal">
                        🎯 目標: ${escHtml(currentGoal)}
                    </div>
                    
                    ${agent.last_action ? `
                    <div class="last-decision">
                        <span class="last-decision-label">⚡ 最近行動:</span>
                        <span>${escHtml(agent.last_action)}</span>
                        ${agent.last_reason ? `<br><span class="last-decision-reason">"${escHtml(agent.last_reason)}"</span>` : ''}
                    </div>
                    ` : ''}
                    
                    <div class="section-title">📝 最近記憶</div>
                    <div class="memory-list">
                        ${observations.length > 0
                            ? observations.map(m => renderMemory(m)).join('')
                            : '<p style="color:#555;font-size:12px">還沒有記憶</p>'
                        }
                    </div>
                    
                    <div class="section-title">💕 人際關係</div>
                    <div class="relationship-list">
                        ${relEntries.length > 0
                            ? relEntries.map(([id, rel]) => renderRelationship(id, rel)).join('')
                            : '<p style="color:#555;font-size:12px">還沒有建立關係</p>'
                        }
                    </div>
                </div>
            `;
        }
        
        function renderMemory(m) {
            const valence = m.emotional_valence ?? 0;
            const cls = valence > 0.3 ? 'positive' : valence < -0.3 ? 'negative' : 'neutral';
            const emoji = valence > 0.3 ? '😊' : valence < -0.3 ? '😠' : '🤔';
            return `
                <div class="memory-item ${cls}">
                    <span class="memory-emoji">${emoji}</span>
                    <span class="memory-content">${escHtml(m.content || '...')}</span>
                    <span class="memory-tick">Tick ${m.tick ?? '?'}</span>
                </div>`;
        }
        
        function renderRelationship(relId, rel) {
            // Find target agent in cached state
            const target = (cachedState?.agents || []).find(a => a.id === relId);
            
            // rel already contains: trust, respect, affinity, familiarity, active_emotions
            const trust = rel.trust ?? 0;
            const respect = rel.respect ?? 0;
            const affinity = rel.affinity ?? 0;
            const familiarity = rel.familiarity ?? 0;
            const emotions = (rel.active_emotions || []).slice(-3);
            
            const affCls = affinity > 0.2 ? 'positive' : affinity < -0.2 ? 'negative' : 'neutral';
            const attText = affinity > 0.3 ? '有好感' : affinity < -0.3 ? '有反感' : '一般';
            
            const emotionHtml = emotions.map(e =>
                `<span class="emotion-tag emotion-${e}">${EMOTION_TEXT[e] || e}</span>`
            ).join('');
            
            return `
                <div class="relationship-item">
                    <div class="rel-avatar">👤</div>
                    <div class="rel-info">
                        <div class="rel-name">${escHtml(target?.name || relId)}</div>
                        <div class="rel-stats">
                            <span>信任 ${Math.round(trust * 100)}%</span>
                            <span>尊重 ${Math.round(respect * 100)}%</span>
                            <span>熟悉 ${Math.round(familiarity * 100)}%</span>
                        </div>
                        ${emotionHtml ? `<div class="rel-emotions">${emotionHtml}</div>` : ''}
                    </div>
                    <div class="affinity-bar" title="${attText}">
                        <div class="affinity-fill affinity-${affCls}" style="width:${Math.min(100, Math.abs(affinity) * 100)}%"></div>
                    </div>
                </div>`;
        }
        
        // ============================================================
        // Helpers
        // ============================================================
        function escHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
